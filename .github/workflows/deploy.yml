name: Deploy to GitHub Pages

on:
  push:
    branches:
      - graduation-project
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript
        run: npx tsc --noEmit || echo "TypeScript check completed with warnings"
        continue-on-error: true

      - name: Build
        run: |
          set -e
          echo "Starting build..."
          echo "NODE_ENV: $NODE_ENV"
          echo "GITHUB_ACTIONS: $GITHUB_ACTIONS"
          npm run build 2>&1 | tee build.log
        env:
          NODE_ENV: production
          GITHUB_ACTIONS: true
          CI: false
          ESLINT_NO_DEV_ERRORS: true
          NEXT_TELEMETRY_DISABLED: 1

      - name: Show build logs on failure
        if: failure()
        run: |
          echo "=== Build failed. Full build log ==="
          cat build.log || echo "No build.log file found"
          echo "=== Checking for out directory ==="
          ls -la out 2>&1 || echo "out directory does not exist"
        continue-on-error: true

      - name: Check build output
        run: |
          if [ ! -d "out" ]; then
            echo "Error: 'out' directory not found after build"
            exit 1
          fi
          echo "Build output directory exists"
          ls -la out | head -20

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
